<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <th:block th:replace="~{fragments/layout :: head('Catalogue')}"/>
</head>
<body>
<th:block th:replace="~{fragments/layout :: navbar}"/>

<main>
  <div class="container">
    <div class="section-label">// STOCK DISPONIBLE</div>
    <div class="section-title">Catalogue</div>

    <!-- FILTRES -->
    <form id="filter-form" th:action="@{/catalogue}" method="get">
      <div class="filters-bar">
        <input class="form-control" type="text" name="search"
               th:value="${search}" placeholder="Rechercher un jeu, une console..."/>
        <select class="form-control form-control-select" name="plateforme" onchange="autoSubmitFilter()">
          <option value="">Toutes plateformes</option>
          <option value="PS5"             th:selected="${plateforme == 'PS5'}">PS5</option>
          <option value="Xbox"            th:selected="${plateforme == 'Xbox'}">Xbox</option>
          <option value="Nintendo Switch" th:selected="${plateforme == 'Nintendo Switch'}">Nintendo Switch</option>
          <option value="PC"              th:selected="${plateforme == 'PC'}">PC</option>
        </select>
        <select class="form-control form-control-select" name="niveauAcces" onchange="autoSubmitFilter()">
          <option value="">Tous les niveaux</option>
          <option value="NORMAL"   th:selected="${niveauAcces == 'NORMAL'}">Normal</option>
          <option value="PREMIUM"  th:selected="${niveauAcces == 'PREMIUM'}">Premium</option>
          <option value="ULTIMATE" th:selected="${niveauAcces == 'ULTIMATE'}">Ultimate</option>
        </select>
        <button type="submit" class="btn btn-primary">🔍 Filtrer</button>
        <a th:href="@{/catalogue}" class="btn btn-secondary">Réinitialiser</a>
      </div>
    </form>

    <!-- GRILLE PRODUITS -->
    <div class="products-grid" th:if="${produits != null and !produits.content.isEmpty()}">
      <div class="product-card" th:each="p : ${produits.content}">
        <div class="product-img">
          <img th:if="${p.imagePrincipaleUrl != null}"
               th:src="${p.imagePrincipaleUrl}"
               th:alt="${p.imagePrincipaleAlt ?: p.nom}"
               onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"/>
          <span th:if="${p.imagePrincipaleUrl == null}">🎮</span>
          <!-- Badge niveau -->
          <span th:if="${p.niveauAccesMin == 'ULTIMATE'}" class="product-badge badge-ultimate">ULTIMATE</span>
          <span th:if="${p.niveauAccesMin == 'PREMIUM'}"  class="product-badge badge-premium">PREMIUM</span>
          <span th:if="${p.niveauAccesMin == 'NORMAL' and p.prixNeuf != null}"    class="product-badge badge-neuf">NEUF</span>
          <span th:if="${p.niveauAccesMin == 'NORMAL' and p.prixNeuf == null}"    class="product-badge badge-occasion">OCCASION</span>
        </div>
        <div class="product-body">
          <div class="product-platform" th:text="${p.plateforme ?: p.typeCategorie}"></div>
          <div class="product-name" th:text="${p.nom}"></div>
          <div class="product-price">
            <span th:text="${p.prixNeuf != null ? #numbers.formatDecimal(p.prixNeuf,1,2) + ' €' : (p.prixOccasion != null ? #numbers.formatDecimal(p.prixOccasion,1,2) + ' €' : 'N/A')}"></span>
            <span th:if="${p.prixNeuf != null and p.prixOccasion != null}"
                  class="product-price-old"
                  th:text="${#numbers.formatDecimal(p.prixOccasion,1,2) + ' €'}"></span>
          </div>
          <div class="product-actions">
            <form th:action="@{/panier/ajouter}" method="post" style="margin:0">
              <input type="hidden" name="produitId" th:value="${p.id}"/>
              <input type="hidden" name="produitNom" th:value="${p.nom}"/>
              <input type="hidden" name="prix" th:value="${p.prixNeuf ?: p.prixOccasion}"/>
              <button type="submit" class="btn btn-sm btn-primary">+ Panier</button>
              <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            </form>
            <a class="btn btn-sm btn-secondary" th:href="@{/catalogue/{id}(id=${p.id})}">Détail</a>
          </div>
        </div>
      </div>
    </div>

    <!-- VIDE -->
    <div th:if="${produits == null or produits.content.isEmpty()}"
         style="text-align:center;padding:4rem;color:var(--text-dim)">
      <div style="font-family:var(--font-head);letter-spacing:3px">Aucun produit trouvé</div>
    </div>

    <!-- PAGINATION -->
    <div class="pagination" th:if="${produits != null and produits.totalPages > 1}">
      <a class="page-link" th:classappend="${produits.first} ? 'disabled'"
         th:href="@{/catalogue(page=${produits.number - 1}, search=${search}, plateforme=${plateforme})}">◀</a>
      <th:block th:each="i : ${#numbers.sequence(0, produits.totalPages - 1)}">
        <a class="page-link" th:classappend="${i == produits.number} ? 'active'"
           th:href="@{/catalogue(page=${i}, search=${search}, plateforme=${plateforme})}"
           th:text="${i + 1}"></a>
      </th:block>
      <a class="page-link" th:classappend="${produits.last} ? 'disabled'"
         th:href="@{/catalogue(page=${produits.number + 1}, search=${search}, plateforme=${plateforme})}">▶</a>
    </div>

  </div>
</main>

<th:block th:replace="~{fragments/layout :: footer}"/>
<th:block th:replace="~{fragments/layout :: scripts}"/>
</body>
</html>
