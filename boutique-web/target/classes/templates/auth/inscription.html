<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <th:block th:replace="~{fragments/layout :: head('Inscription')}"/>
</head>
<body>
<th:block th:replace="~{fragments/layout :: navbar}"/>

<main>
  <div class="container-sm" style="padding-top:2rem">

    <div class="card card-accent-top">
      <div class="card-header">// CRÉER UN COMPTE</div>
      <div class="card-body">

        <div th:if="${errorMessage}" class="alert alert-error" th:text="${errorMessage}"></div>

        <form th:action="@{/auth/inscription}" method="post" th:object="${inscriptionForm}" novalidate>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label" for="nom">Nom</label>
              <input class="form-control" type="text" id="nom" th:field="*{nom}" placeholder="Dupont" required/>
              <div class="invalid-feedback" th:if="${#fields.hasErrors('nom')}" th:errors="*{nom}"></div>
            </div>
            <div class="form-group">
              <label class="form-label" for="prenom">Prénom</label>
              <input class="form-control" type="text" id="prenom" th:field="*{prenom}" placeholder="Jean" required/>
              <div class="invalid-feedback" th:if="${#fields.hasErrors('prenom')}" th:errors="*{prenom}"></div>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label" for="pseudo">Pseudo</label>
            <input class="form-control" type="text" id="pseudo" th:field="*{pseudo}" placeholder="GamerXX" required/>
            <div class="invalid-feedback" th:if="${#fields.hasErrors('pseudo')}" th:errors="*{pseudo}"></div>
            <div class="form-text">Lettres, chiffres, _ ou - (3-50 caractères)</div>
          </div>

          <div class="form-group">
            <label class="form-label" for="email">Email</label>
            <input class="form-control" type="email" id="email" th:field="*{email}" placeholder="votre@email.com" required/>
            <div class="invalid-feedback" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
          </div>

          <div class="form-group">
            <label class="form-label" for="motDePasse">Mot de passe</label>
            <input class="form-control" type="password" id="motDePasse" th:field="*{motDePasse}" placeholder="Min. 8 caractères" required/>
            <div class="password-strength">
              <div class="strength-bar" id="strength-1"></div>
              <div class="strength-bar" id="strength-2"></div>
              <div class="strength-bar" id="strength-3"></div>
              <div class="strength-bar" id="strength-4"></div>
            </div>
            <div class="invalid-feedback" th:if="${#fields.hasErrors('motDePasse')}" th:errors="*{motDePasse}"></div>
            <div class="form-text">Min. 8 cars • 1 majuscule • 1 chiffre • 1 spécial</div>
          </div>

          <div class="form-group">
            <label class="form-label" for="confirmMotDePasse">Confirmer le mot de passe</label>
            <input class="form-control" type="password" id="confirmMotDePasse" th:field="*{confirmMotDePasse}" placeholder="Retapez votre mot de passe" required/>
            <div class="invalid-feedback" th:if="${#fields.hasErrors('confirmMotDePasse')}" th:errors="*{confirmMotDePasse}"></div>
          </div>

          <div class="form-group">
            <label class="form-label" for="dateNaissance">Date de naissance <span style="color:var(--text-dim)">(optionnel)</span></label>
            <input class="form-control" type="date" id="dateNaissance" th:field="*{dateNaissance}"/>
            <div class="invalid-feedback" th:if="${#fields.hasErrors('dateNaissance')}" th:errors="*{dateNaissance}"></div>
          </div>

          <div class="form-group">
            <label class="form-label" for="telephone">Téléphone <span style="color:var(--text-dim)">(optionnel)</span></label>
            <input class="form-control" type="tel" id="telephone" th:field="*{telephone}" placeholder="0612345678"/>
            <div class="invalid-feedback" th:if="${#fields.hasErrors('telephone')}" th:errors="*{telephone}"></div>
          </div>

          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="rgpdConsent" th:field="*{rgpdConsent}" required/>
            <label class="form-check-label" for="rgpdConsent">
              J'accepte que mes données soient utilisées conformément à la politique de confidentialité
              (<strong style="color:var(--accent)">RGPD</strong>)
            </label>
            <div class="invalid-feedback" th:if="${#fields.hasErrors('rgpdConsent')}" th:errors="*{rgpdConsent}"></div>
          </div>

          <div class="invalid-feedback mt-2"
               th:if="${#fields.hasGlobalErrors()}"
               th:each="err : ${#fields.globalErrors()}"
               th:text="${err}">
          </div>

          <button type="submit" class="btn btn-primary btn-full mt-3">
            Créer mon compte
          </button>

          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        </form>

        <p style="text-align:center;margin-top:1.5rem;font-size:0.85rem;color:var(--text-dim)">
          Déjà un compte ? <a th:href="@{/auth/login}">Se connecter</a>
        </p>

      </div>
    </div>

  </div>
</main>

<th:block th:replace="~{fragments/layout :: footer}"/>
<th:block th:replace="~{fragments/layout :: scripts}"/>
</body>
</html>
